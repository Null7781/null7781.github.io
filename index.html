<html>
<html lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Test</title>
<link rel="icon" type="image/png" href=".png" />
<link rel="stylesheet" href="theme.css" >
</head>
 <input type="checkbox" id="check01" name="Yes" value="1">

<body style="background-color:green">
<h2 class="title">Page num1</h2>
<button id="button01">Next Page</button>

 <button id="button02" style="color:red; position:absolute; top:50px; left:5px;">Error</button>

<script>
 
let numa;
let numb;
let numc;
let numd;
 
function randomNumbers(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
 
function Startup() {
 numa = randomNumbers(1, 10);
 numb = randomNumbers(1, 10);
 numc = randomNumbers(1, 10);
 numd = randomNumbers(1, 10);
}
 
function press() {
 var url="index2.html";
 window.location = url;
};

function moveUp(element) {
  var elementStyle = window.getComputedStyle(element);
  var elementTop = elementStyle.getPropertyValue("top").replace("px", "");
  element.style.top = (Number(elementTop) - 20) + "px";
}

function moveDown(element) {
  var elementStyle = window.getComputedStyle(element);
  var elementTop = elementStyle.getPropertyValue("top").replace("px", "");
  element.style.top = (Number(elementTop) + 20) + "px";
}
 
function moveRight(element) {
  var elementStyle = window.getComputedStyle(element);
  var elementRight = elementStyle.getPropertyValue("left").replace("px", "");
  element.style.left = (Number(elementRight) + 20) + "px";
}

function moveLeft(element) {
  var elementStyle = window.getComputedStyle(element);
  var elementLeft = elementStyle.getPropertyValue("left").replace("px", "");
  element.style.left = (Number(elementLeft) - 20) + "px";
}

var rightPressed = false;
var leftPressed = false;
var downPressed = false;
var upPressed = false;

window.addEventListener('keydown', keyDownHandler, false);
window.addEventListener('keyup', keyUpHandler, false); 
 
function keyDownHandler(event) {
    if(event.keyCode == 39) {
        rightPressed = true;
    }
    else if(event.keyCode == 37) {
        leftPressed = true;
    }
    if(event.keyCode == 40) {
    	downPressed = true;
    }
    else if(event.keyCode == 38) {
    	upPressed = true;
    }
} 
 
function keyUpHandler(event) {
    if(event.keyCode == 39) {
        rightPressed = false;
    }
    else if(event.keyCode == 37) {
        leftPressed = false;
    }
    if(event.keyCode == 40) {
    	downPressed = false;
    }
    else if(event.keyCode == 38) {
    	upPressed = false;
    }
} 

 if(rightPressed) {
  
  moveRight(document.getElementById("button02"));
  
 }
 else if (leftPressed) {
 
  moveLeft(document.getElementById("button02"));
  
 }
 if(downPressed) {
 
  moveDown(document.getElementById("button02"));
  
 } else if (upPressed) {
  
  moveUp(document.getElementById("button02"));
  
 }

document.getElementById("button02").onclick = function() {
  alert(numa + numb + numc + numd);
};
 
document.getElementById("button01").onclick = function() {
  press();
};


Startup();
</script>
<p class="content"> Interesing Text 📱</p>
</body>
